; wydoujin PHP hardening. / PHPの上限設定。
; A bounded memory_limit is the backstop for processing untrusted archive/image
; content: a pixel-flood/zip-bomb that slips past the in-code caps fails THIS
; request/job with a catchable error instead of OOM-killing the worker process.
; アプリ側の上限を抜けた巨大画像/zipでも、プロセスごとOOMさせずこのリクエスト/ジョブだけ失敗させる。
memory_limit = 256M
