services:
  app:
    image: wydoujin:dev
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_KEY: ${APP_KEY}
      APP_PASSWORD: ${APP_PASSWORD:-}
      # Background workers (scan + cover-gen). Default 1, range 1–4. / 背景ワーカー数。
      QUEUE_WORKERS: ${QUEUE_WORKERS:-1}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-wydoujin}
      DB_USERNAME: ${DB_USERNAME:-wydoujin}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - ${LIBRARY_PATH:-./library}:/library:ro
      - wydoujin_data:/data
    depends_on:
      - mysql
    restart: unless-stopped
    # Block privilege escalation. Not cap_drop:[ALL] — s6-setuidgid needs SETUID/SETGID to
    # drop the app processes to www-data; a read-only rootfs would need tmpfs for storage.
    # 権限昇格を禁止（s6-setuidgidにSETUID/SETGID必須のためcap全dropは不可）。
    security_opt:
      - no-new-privileges:true

  # Optional: to use an external MySQL server, remove this service AND the app's `depends_on: mysql` above, then point DB_HOST/DB_PORT/etc. at your server.
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-wydoujin}
      MYSQL_USER: ${DB_USERNAME:-wydoujin}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in .env}
    volumes:
      - wydoujin_db:/var/lib/mysql
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  wydoujin_data:
  wydoujin_db:
